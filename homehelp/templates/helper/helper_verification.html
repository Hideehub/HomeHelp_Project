<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
  <title>Verification</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Background image layer */
    .bg-wrapper {
      min-height: 100vh;
      background: url("/static/images/mountingpic.jpg") no-repeat center center/cover;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 15px;
    }

    /* Dark overlay for readability */
    .bg-wrapper::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
    }

    /* Card */
    .form-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      font-weight: 700;
      color: #008080; /* TEAL */
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .btn-teal {
      background-color: #008080;
      color: white;
      transition: 0.3s ease;
    }

    .btn-teal:hover {
      background-color: #006666;
      color: white;
    }

    textarea, input {
      border-radius: 8px !important;
    }
  </style>
</head>

<body>

<div class="bg-wrapper">

  <div class="form-card">

    {% set message = get_flashed_messages(with_categories=True) %}
    {% if message %}
      {% for msg , cat in message %}
        {% if cat == 'errormsg' %}
          <div class="alert alert-danger">{{msg}}</div>
        {% else %}
          <div class="alert alert-success">{{msg}}</div>
        {% endif %}
      {% endfor %}
    {% endif %}

    <h2 class="text-center mb-4">Complete Your Profile</h2>

    <form action="{{url_for('helper_verification', worker_id=worker_id)}}"
          method="post"
          enctype="multipart/form-data">

      <input type="hidden" name="csrf_token" value="{{csrf_token()}}">

      <div class="mb-3">
        <label>About Yourself</label>
        <textarea name="exp_about" class="form-control" rows="3"></textarea>
      </div>

      <div class="mb-3">
        <label>Years of Experience</label>
        <input type="number" name="exp_years" class="form-control p-2">
      </div>

      <div class="mb-3">
        <label>Upload Your Image</label>
        <input type="file" name="exp_picture" class="form-control p-2">
      </div>

      <button class="btn btn-teal w-100 mt-3 py-2">
        Submit
      </button>

    </form>

  </div>

</div>

</body>
</html>
